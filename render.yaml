# render.yaml
services:
  - type: web
    name: portfolio-backend
    env: python
    buildCommand: |
      cd backend
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      cd backend
      gunicorn wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: portfolio-backend.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://portfolio-frontend.onrender.com,http://localhost:3000
      - key: CSRF_TRUSTED_ORIGINS
        value: https://portfolio-frontend.onrender.com,https://portfolio-backend.onrender.com

  - type: web
    name: portfolio-frontend
    env: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://portfolio-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
